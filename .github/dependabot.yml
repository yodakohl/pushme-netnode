version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    labels:
      - dependencies
      - github-actions
      - security
    commit-message:
      prefix: ci(deps)
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Etc/UTC
    labels:
      - dependencies
      - docker
      - security
    commit-message:
      prefix: build(deps)
    groups:
      base-images:
        patterns:
          - "*"
